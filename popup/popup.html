<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Comment Overlay</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <span class="title">YouTube Comment Overlay</span>
    <div class="header-right">
      <button id="btn-lang" class="btn-lang">EN</button>
      <label class="toggle">
        <input type="checkbox" id="chk-enabled">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <label class="label" for="input-apikey" data-i18n="apiKeyLabel"></label>
    <div class="row">
      <input type="password" id="input-apikey" class="input" placeholder="AIza...">
      <button id="btn-save" class="btn-save" data-i18n="save"></button>
    </div>
    <p id="msg-status" class="msg"></p>
  </div>

  <div class="divider"></div>

  <!-- 표시 모드 -->
  <div class="section">
    <span class="label" data-i18n="displayMode"></span>
    <div class="mode-row">
      <label class="mode-btn">
        <input type="radio" name="mode" value="fade" id="mode-fade">
        <span data-i18n="modeFade"></span>
      </label>
      <label class="mode-btn">
        <input type="radio" name="mode" value="scroll" id="mode-scroll">
        <span data-i18n="modeScroll"></span>
      </label>
    </div>
  </div>

  <!-- 배경 투명도 -->
  <div class="section">
    <label class="label" for="range-opacity" data-i18n="bgOpacity"></label>
    <div class="slider-row">
      <span class="slider-label" data-i18n="transparent"></span>
      <input type="range" id="range-opacity" min="0" max="100" step="5" value="55">
      <span class="slider-label" data-i18n="opaque"></span>
      <span id="opacity-value" class="slider-value">55%</span>
    </div>
  </div>

  <!-- 자막 위치 -->
  <div class="section">
    <span class="label" data-i18n="position"></span>
    <div class="position-grid">
      <button class="pos-btn" data-pos="top-left">↖</button>
      <button class="pos-btn" data-pos="top">↑</button>
      <button class="pos-btn" data-pos="top-right">↗</button>
      <button class="pos-btn" data-pos="middle-left">←</button>
      <div class="pos-center"></div>
      <button class="pos-btn" data-pos="middle-right">→</button>
      <button class="pos-btn" data-pos="bottom-left">↙</button>
      <button class="pos-btn" data-pos="bottom">↓</button>
      <button class="pos-btn" data-pos="bottom-right">↘</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
